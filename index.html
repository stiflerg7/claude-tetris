<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section highscores-section">
          <span class="label">TOP 5 RÉCORDS</span>
          <ol id="home-highscores" class="highscores-list"></ol>
          <div class="stats-line">
            <span>Combo máx: <strong id="stat-best-combo">0</strong></span>
            <span>Líneas máx: <strong id="stat-max-lines">0</strong></span>
          </div>
          <button id="reset-highscores-btn" class="reset-btn">Resetear récords</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <form id="name-form" class="name-form hidden">
          <label for="name-input">¡Nuevo récord! Ingresa tu nombre:</label>
          <input id="name-input" type="text" maxlength="12" autocomplete="off" placeholder="JUGADOR" />
          <button type="submit">Guardar</button>
        </form>
        <ol id="overlay-highscores" class="highscores-list"></ol>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
